  <script>
    const stored = localStorage.getItem("theme");
    const prefersDark = window.matchMedia(
      "(prefers-color-scheme: dark)",
    ).matches;
    const theme =
      stored === "system" || !stored
        ? prefersDark
          ? "dark"
          : "light"
        : stored;
    if (theme === "dark") document.documentElement.classList.add("dark");
  </script>
